<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlasul Muscular - Ghid Interactiv de Atrofie Musculara</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        /* ============================================
           CSS CUSTOM PROPERTIES
           ============================================ */
        :root {
            /* Dark Theme */
            --bg-primary: #0a0b0f;
            --bg-secondary: #12131a;
            --bg-card: #1a1b25;
            --bg-hover: #222538;

            /* Text */
            --text-primary: #e8e9f0;
            --text-secondary: #9a9cb0;
            --text-muted: #6b6d82;

            /* Accent */
            --accent: #6c5ce7;
            --accent-hover: #7d6ff0;

            /* Atrophy Risk Colors */
            --risk-rapid: #e74c3c;
            --risk-moderate: #e67e22;
            --risk-slow: #f1c40f;
            --risk-very-slow: #2ecc71;

            /* Activity Colors */
            --activity-desk: #e74c3c;
            --activity-walking: #2ecc71;
            --activity-cycling: #3498db;
            --activity-combined: #9b59b6;

            /* Glass Effect */
            --glass-bg: rgba(26, 27, 37, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: 20px;

            /* Spacing Scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            --space-3xl: 64px;

            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;

            /* Transitions */
            --transition-fast: 0.15s;
            --transition-normal: 0.3s;
            --transition-slow: 0.6s;
        }

        /* ============================================
           BASE STYLES & RESET
           ============================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Selection */
        ::selection {
            background-color: var(--accent);
            color: #ffffff;
        }

        /* ============================================
           NAVIGATION
           ============================================ */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            display: flex;
            align-items: center;
        }

        .nav-inner {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 0 var(--space-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: var(--space-lg);
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            transition: color var(--transition-fast) ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width var(--transition-normal) ease;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: var(--space-xs);
        }

        .nav-hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 1px;
            transition: all var(--transition-normal) ease;
        }

        /* ============================================
           SECTION BASE
           ============================================ */
        .section {
            padding: 80px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 16px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            border-radius: 2px;
        }

        .section-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin-top: var(--space-md);
        }

        /* ============================================
           HERO SECTION
           ============================================ */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px;
        }

        .hero-content {
            max-width: 900px;
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: var(--space-lg);
            background: linear-gradient(135deg, var(--accent), var(--risk-rapid), var(--risk-moderate), var(--risk-slow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1.3rem;
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto var(--space-2xl);
            line-height: 1.7;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-top: 48px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: var(--space-xs);
        }

        /* Animate In */
        .animate-in {
            animation: fadeInUp 0.6s ease forwards;
        }

        .animate-in-hidden {
            opacity: 0;
            transform: translateY(30px);
        }

        /* ============================================
           CARDS SYSTEM
           ============================================ */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--glass-border);
            transition: transform var(--transition-normal) ease, box-shadow var(--transition-normal) ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
        }

        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .card-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-rapid {
            background: rgba(231, 76, 60, 0.2);
            color: var(--risk-rapid);
        }

        .badge-moderate {
            background: rgba(230, 126, 34, 0.2);
            color: var(--risk-moderate);
        }

        .badge-slow {
            background: rgba(241, 196, 15, 0.2);
            color: var(--risk-slow);
        }

        .badge-very-slow {
            background: rgba(46, 204, 113, 0.2);
            color: var(--risk-very-slow);
        }

        /* ============================================
           BODY MAP
           ============================================ */
        .body-map-container {
            display: flex;
            gap: 48px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .body-view {
            position: relative;
        }

        .body-view svg {
            width: 350px;
            height: auto;
        }

        .muscle-region {
            fill: rgba(108, 92, 231, 0.15);
            stroke: rgba(108, 92, 231, 0.3);
            stroke-width: 1;
            cursor: pointer;
            transition: all var(--transition-normal) ease;
        }

        .muscle-region:hover {
            fill: rgba(108, 92, 231, 0.4);
            stroke: var(--accent);
            filter: drop-shadow(0 0 8px var(--accent));
        }

        .muscle-region.risk-rapid {
            fill: rgba(231, 76, 60, 0.2);
            stroke: var(--risk-rapid);
        }

        .muscle-region.risk-moderate {
            fill: rgba(230, 126, 34, 0.2);
            stroke: var(--risk-moderate);
        }

        .muscle-region.risk-slow {
            fill: rgba(241, 196, 15, 0.2);
            stroke: var(--risk-slow);
        }

        .muscle-region.risk-very-slow {
            fill: rgba(46, 204, 113, 0.2);
            stroke: var(--risk-very-slow);
        }

        .muscle-tooltip {
            position: fixed;
            background: var(--bg-card);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: var(--radius-md);
            z-index: 200;
            pointer-events: none;
            max-width: 300px;
            opacity: 0;
            transition: opacity var(--transition-fast) ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* ============================================
           EXPLORER
           ============================================ */
        .explorer-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-primary);
            width: 300px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition-fast) ease;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .filter-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            transition: all var(--transition-fast) ease;
        }

        .filter-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }

        .muscle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .muscle-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            transition: transform var(--transition-normal) ease, box-shadow var(--transition-normal) ease;
        }

        .muscle-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .muscle-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .muscle-card.risk-rapid::before {
            background: var(--risk-rapid);
        }

        .muscle-card.risk-moderate::before {
            background: var(--risk-moderate);
        }

        .muscle-card.risk-slow::before {
            background: var(--risk-slow);
        }

        .muscle-card.risk-very-slow::before {
            background: var(--risk-very-slow);
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
            margin: var(--space-sm) 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
        }

        .muscle-detail {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .muscle-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: var(--space-sm);
        }

        .tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text-muted);
        }

        /* ============================================
           SIMULATOR
           ============================================ */
        .simulator-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        .controls-panel {
            background: var(--bg-card);
            padding: 32px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
        }

        .results-panel {
            background: var(--bg-card);
            padding: 32px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
        }

        .slider-group {
            margin-bottom: 24px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .slider-value {
            font-weight: 700;
            color: var(--accent);
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            transition: transform var(--transition-fast) ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            transition: transform var(--transition-fast) ease;
        }

        .health-bars {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .health-bar-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .health-label {
            width: 140px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .health-bar {
            flex: 1;
            height: 24px;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .health-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 0.8s ease;
            position: relative;
        }

        .health-value {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .scenario-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 24px;
        }

        .scenario-card {
            text-align: center;
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all var(--transition-normal) ease;
            background: transparent;
        }

        .scenario-card:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
        }

        .scenario-card.active {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.1);
        }

        .scenario-icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }

        /* ============================================
           DASHBOARD
           ============================================ */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .chart-container {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            min-height: 350px;
        }

        .chart-title {
            font-weight: 600;
            margin-bottom: 16px;
        }

        .radar-chart {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .heatmap {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 4px;
        }

        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            transition: transform var(--transition-fast) ease;
        }

        .heatmap-cell:hover {
            transform: scale(1.05);
        }

        /* ============================================
           POSTURE SECTION
           ============================================ */
        .posture-container {
            display: flex;
            gap: 32px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .posture-diagram {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .posture-issues {
            flex: 1;
            min-width: 300px;
        }

        .issue-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--glass-border);
            margin-bottom: 12px;
            cursor: pointer;
            transition: all var(--transition-normal) ease;
        }

        .issue-card:hover {
            background: var(--bg-hover);
        }

        .issue-card.active {
            border-left: 3px solid var(--risk-rapid);
        }

        .severity-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ============================================
           RECOVERY
           ============================================ */
        .recovery-timeline {
            position: relative;
            padding-left: 32px;
        }

        .timeline-line {
            position: absolute;
            left: 14px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--glass-border);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 24px;
            padding-left: 24px;
        }

        .timeline-dot {
            position: absolute;
            left: -25px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            border: 3px solid var(--bg-primary);
        }

        .timeline-phase {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .timeline-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .exercise-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .exercise-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 16px;
            border: 1px solid var(--glass-border);
            transition: transform var(--transition-normal) ease, box-shadow var(--transition-normal) ease;
        }

        .exercise-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .exercise-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .exercise-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            background: var(--bg-secondary);
            padding: 32px;
            text-align: center;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes countUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.6s ease forwards;
        }

        .animate-delay-1 {
            animation-delay: 0.1s;
        }

        .animate-delay-2 {
            animation-delay: 0.2s;
        }

        .animate-delay-3 {
            animation-delay: 0.3s;
        }

        .animate-delay-4 {
            animation-delay: 0.4s;
        }

        /* ============================================
           RESPONSIVE - 1024px
           ============================================ */
        @media (max-width: 1024px) {
            .simulator-panel {
                grid-template-columns: 1fr;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .scenario-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* ============================================
           RESPONSIVE - 768px
           ============================================ */
        @media (max-width: 768px) {
            .nav-links {
